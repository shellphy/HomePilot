# 一键部署：FrankenPHP 单容器（Caddy 内嵌 PHP + 自动 HTTPS + sqlite，无需前置 nginx）
#
# 自动 HTTPS 前置：域名 A 记录指向本机、防火墙放行 80/443（TCP + UDP）。
#
# 首次部署：
#   1. cp .env.example .env，填 SERVER_NAME / APP_URL / WECHAT_* / DEEPSEEK_API_KEY，
#      APP_KEY 用 `docker compose run --rm --no-deps app php artisan key:generate --show` 生成
#   2. docker compose up -d --build（自动迁移 + 签证书）
# 更新：git pull && docker compose up -d --build

services:
  app:
    build:
      context: .
      target: app
    restart: unless-stopped
    env_file: .env
    environment:
      # 站点地址 = HTTPS 开关：默认 :80（纯 HTTP），填域名则自动 HTTPS
      SERVER_NAME: ${SERVER_NAME:-:80}
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/storage/database/database.sqlite
      LOG_CHANNEL: stderr
    ports:
      # 自动 HTTPS 模式下 HTTP_PORT/HTTPS_PORT 必须是 80/443（ACME 校验固定走这两口）
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp" # HTTP/3
    volumes:
      - storage-uploads:/var/www/html/storage/app/public
      - sqlite-data:/var/www/html/storage/database
      # 证书/ACME 账号必须持久化，否则重启重签会撞 Let's Encrypt 限流
      - caddy-data:/data
      - caddy-config:/config

volumes:
  storage-uploads:
  sqlite-data:
  caddy-data:
  caddy-config:
