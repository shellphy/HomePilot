# 服务器 Git 工作区挂载到基础运行镜像的 /app。
x-app-base: &app-base
  image: ${APP_IMAGE:-registry.cn-hangzhou.aliyuncs.com/shellphy/homepolit:base}
  restart: unless-stopped
  user: "${APP_UID:-1000}:${APP_GID:-1000}"
  volumes:
    - .:/app
  stop_grace_period: 30s
  healthcheck:
    test: ["CMD", "php", "-v"]
    interval: 30s
    timeout: 5s
    retries: 3
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  cli:
    <<: *app-base
    entrypoint: ["sleep", "infinity"]

  app:
    <<: *app-base
    command: ["app"]
    environment:
      SERVER_NAME: ${SERVER_NAME:-:80}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    <<: *app-base
    command: ["queue", "--tries=3", "--timeout=180", "--sleep=3", "--max-time=3600"]
    stop_grace_period: 210s

  scheduler:
    <<: *app-base
    command: ["scheduler"]
