# 服务器 Git 工作区挂载到基础运行镜像的 /app。
x-app-base: &app-base
  image: ${APP_IMAGE:-registry.cn-hangzhou.aliyuncs.com/shellphy/homepolit:base}
  restart: unless-stopped
  environment: &app-env
    DB_CONNECTION: sqlite
    DB_DATABASE: /app/storage/database/database.sqlite
    LOG_CHANNEL: daily
  user: "${APP_UID:-1000}:${APP_GID:-1000}"
  working_dir: /app
  volumes:
    - .:/app
  stop_grace_period: 30s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  cli:
    <<: *app-base
    entrypoint: ["sleep", "infinity"]

  app:
    <<: *app-base
    command: ["app"]
    environment:
      <<: *app-env
      SERVER_NAME: ${SERVER_NAME:-:80}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    healthcheck:
      test: ["CMD", "php", "/usr/local/bin/healthcheck.php"]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 30s

  worker:
    <<: *app-base
    command: ["queue", "--tries=3", "--timeout=180", "--sleep=3", "--max-time=3600"]
    stop_grace_period: 210s
    depends_on:
      app:
        condition: service_healthy

  scheduler:
    <<: *app-base
    command: ["scheduler"]
    depends_on:
      app:
        condition: service_healthy
