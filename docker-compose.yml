# 一键部署：FrankenPHP 单容器（Caddy 内嵌 PHP + 自动 HTTPS + sqlite，无需前置 nginx）
#
# 自动 HTTPS 前置：域名 A 记录指向本机、防火墙放行 80/443（TCP + UDP）。
#
# 镜像在开发机上交叉构建后推到镜像仓库，服务器只拉不建（见 docker/build-push.sh）。
#
# 首次部署（服务器上只需 docker-compose.yml + .env 两个文件）：
#   1. docker login registry.cn-hangzhou.aliyuncs.com
#   2. cp .env.example .env，填 SERVER_NAME / APP_URL / WECHAT_* / DEEPSEEK_API_KEY，
#      APP_KEY 用 `docker compose run --rm --no-deps app php artisan key:generate --show` 生成
#   3. docker compose up -d（自动迁移 + 签证书）
# 更新：docker compose pull && docker compose up -d
# 回滚：APP_IMAGE=<仓库>:<旧 tag> docker compose up -d

# app 与 worker 复用同一镜像、同一份环境与共享卷（sqlite 库、上传目录都要一致）
x-app-base: &app-base
  image: ${APP_IMAGE:-registry.cn-hangzhou.aliyuncs.com/shellphy/homepolit:latest}
  restart: unless-stopped
  env_file: .env
  environment: &app-env
    DB_CONNECTION: sqlite
    DB_DATABASE: /var/www/html/storage/database/database.sqlite
    # 日志按天切割写文件，落在具名卷里跨重新部署保留（保留天数见 LOG_DAILY_DAYS）
    LOG_CHANNEL: daily
  volumes: &app-volumes
    - storage-uploads:/var/www/html/storage/app/public
    - sqlite-data:/var/www/html/storage/database
    - storage-logs:/var/www/html/storage/logs

services:
  app:
    <<: *app-base
    environment:
      <<: *app-env
      # 站点地址 = HTTPS 开关：默认 :80（纯 HTTP），填域名则自动 HTTPS
      SERVER_NAME: ${SERVER_NAME:-:80}
    ports:
      # 自动 HTTPS 模式下 HTTP_PORT/HTTPS_PORT 必须是 80/443（ACME 校验固定走这两口）
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp" # HTTP/3
    volumes:
      - storage-uploads:/var/www/html/storage/app/public
      - sqlite-data:/var/www/html/storage/database
      - storage-logs:/var/www/html/storage/logs
      # 证书/ACME 账号必须持久化，否则重启重签会撞 Let's Encrypt 限流
      - caddy-data:/data
      - caddy-config:/config

  # 队列消费者：微信订阅消息与 AI 报告生成任务都靠它落地。
  # 复用 app 镜像，只把启动命令换成 queue:work；app 容器负责迁移，故 depends_on。
  worker:
    <<: *app-base
    depends_on:
      - app
    command: php artisan queue:work --tries=3 --timeout=180 --sleep=3 --max-time=3600
    deploy:
      replicas: 3

volumes:
  storage-uploads:
  sqlite-data:
  storage-logs:
  caddy-data:
  caddy-config:
