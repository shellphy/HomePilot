# 一键部署（php-fpm + nginx + sqlite）
#
# 首次部署：
#   1. cp .env.example .env
#   2. 编辑 .env：
#        APP_ENV=production、APP_DEBUG=false、APP_URL=https://你的域名
#        WECHAT_APPID / WECHAT_SECRET / DEEPSEEK_API_KEY
#   3. 生成并填入 APP_KEY：
#        docker compose run --rm --no-deps app php artisan key:generate --show
#   4. docker compose up -d --build
#      启动时自动执行数据库迁移，完成后访问 http://服务器IP:8080
#
# 更新版本：git pull && docker compose up -d --build
#
# 如果服务器上已有宿主机 nginx 负责 80/443 与 HTTPS，保持 HTTP_PORT=8080，
# 在宿主机 nginx 里对该端口做反向代理即可：
# server {
#     listen 80;
#     server_name tianqingfu.shellphy.cn;
#
#     client_max_body_size 20m;
#
#     location / {
#         proxy_pass http://127.0.0.1:8080;
#         proxy_set_header Host $host;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header X-Forwarded-Proto $scheme;
#     }
# }

services:
  app:
    build:
      context: .
      target: app
    restart: unless-stopped
    env_file: .env
    environment:
      DB_CONNECTION: sqlite
      # 数据库文件放在具名卷里，随容器重建持久保留
      DB_DATABASE: /var/www/html/storage/database/database.sqlite
      # 日志输出到容器 stderr，方便 docker compose logs 查看
      LOG_CHANNEL: stderr
    volumes:
      - storage-uploads:/var/www/html/storage/app/public
      - sqlite-data:/var/www/html/storage/database

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - storage-uploads:/var/www/html/storage/app/public:ro
    depends_on:
      - app

volumes:
  storage-uploads:
  sqlite-data:
