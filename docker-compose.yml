# 服务器 Git 工作区挂载到基础运行镜像的 /app。
x-app-base: &app-base
  image: ${APP_IMAGE:-registry.cn-hangzhou.aliyuncs.com/shellphy/homepolit:base}
  restart: unless-stopped
  environment: &app-env
    DB_CONNECTION: sqlite
    DB_DATABASE: /app/storage/database/database.sqlite
    LOG_CHANNEL: daily
  user: "${APP_UID:-1000}:${APP_GID:-1000}"
  working_dir: /app
  volumes: &app-volumes
    - .:/app
    - storage-uploads:/app/storage/app/public
    - sqlite-data:/app/storage/database
    - storage-logs:/app/storage/logs
  stop_grace_period: 30s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"
  depends_on:
    volume-init:
      condition: service_completed_successfully

services:
  # 使用 APP_UID/APP_GID 初始化持久化目录权限。
  volume-init:
    image: ${APP_IMAGE:-registry.cn-hangzhou.aliyuncs.com/shellphy/homepolit:base}
    user: root
    restart: "no"
    environment:
      APP_UID: ${APP_UID:-1000}
      APP_GID: ${APP_GID:-1000}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /volumes/uploads /volumes/database /volumes/logs /data /config /backups
        chown -R "$${APP_UID}:$${APP_GID}" /volumes /data /config /backups
    volumes:
      - storage-uploads:/volumes/uploads
      - sqlite-data:/volumes/database
      - storage-logs:/volumes/logs
      - caddy-data:/data
      - caddy-config:/config
      - ${BACKUP_DIR:-/var/backups/homepilot}:/backups

  # Makefile 通过该服务执行一次性运维命令。
  cli:
    <<: *app-base
    restart: "no"
    command: ["sleep", "infinity"]
    volumes:
      - .:/app
      - storage-uploads:/app/storage/app/public
      - sqlite-data:/app/storage/database
      - storage-logs:/app/storage/logs
      - ${BACKUP_DIR:-/var/backups/homepilot}:/backups

  app:
    <<: *app-base
    command: ["app"]
    environment:
      <<: *app-env
      SERVER_NAME: ${SERVER_NAME:-:80}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - .:/app
      - storage-uploads:/app/storage/app/public
      - sqlite-data:/app/storage/database
      - storage-logs:/app/storage/logs
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test: ["CMD", "php", "/usr/local/bin/healthcheck.php"]
      interval: 15s
      timeout: 8s
      retries: 5
      start_period: 30s

  worker:
    <<: *app-base
    command: ["queue", "--tries=3", "--timeout=180", "--sleep=3", "--max-time=3600"]
    stop_grace_period: 210s
    depends_on:
      app:
        condition: service_healthy
      volume-init:
        condition: service_completed_successfully

  scheduler:
    <<: *app-base
    command: ["scheduler"]
    volumes:
      - .:/app
      - storage-uploads:/app/storage/app/public
      - sqlite-data:/app/storage/database
      - storage-logs:/app/storage/logs
      - ${BACKUP_DIR:-/var/backups/homepilot}:/backups
    depends_on:
      app:
        condition: service_healthy
      volume-init:
        condition: service_completed_successfully

volumes:
  storage-uploads:
  sqlite-data:
  storage-logs:
  caddy-data:
  caddy-config:
